name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Test
        run: python -m pytest -q

      - name: Import boundary
        run: python scripts/check_no_core_internal_imports.py

      - name: Generate Core OpenAPI fixture
        run: |
          mkdir -p .tmp
          python - <<'PY'
          import json
          import tempfile
          from pathlib import Path

          from fastapi.testclient import TestClient
          from mneme_service.app import create_app
          from mneme_service.config import Settings

          with tempfile.TemporaryDirectory(prefix="mneme-adapter-openapi-") as temp_dir:
              client = TestClient(
                  create_app(Settings(db_path=Path(temp_dir) / "mneme.db", auth_token="ci-token"))
              )
              response = client.get("/openapi.json")
              response.raise_for_status()
              Path(".tmp/core-openapi.json").write_text(
                  json.dumps(response.json(), sort_keys=True),
                  encoding="utf-8",
              )
          PY

      - name: Core contract drift
        run: python scripts/check_core_contract_drift.py --openapi .tmp/core-openapi.json

      - name: Compile
        run: python -m compileall -q mneme_codex_adapter tests scripts
